<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <!-- daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <style>
        .outfit {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="header border-b-2 border-gray-300 sticky top-0 bg-base-200 z-50">
        <header class=" w-11/12 mx-auto py-3 flex justify-between items-center">
             <div class="left flex gap-2 items-center">
                 <div class="logo">
                     <img class="w-[60px]" src="./assets/logo.png" alt="">
                 </div>
                 <div class="balance">
                    <h2  class="text-2xl font-bold">$<span id="balance">1200</span></h2>
                    <p class="text-neutral/50">Available Balance</p>
                 </div>
             </div>
             <div class="right">
                 <a class="btn btn-soft" href="./index.html"><i class="fa-solid fa-right-from-bracket"></i>Logout</a>
             </div>
        </header>
    </div>

    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h1 class="text-3xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h1>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-3 pt-4">
            <button onclick="setVisible('addMoney-cont')" class="btn flex-col h-full p-5 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="setVisible('cashout-cont')" class="btn flex-col h-full p-5">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn flex-col h-full p-5">
                <img src="./assets/opt-3.png" alt="">
                <p>Transfer<br>Money</p>
            </button>
            <button class="btn flex-col h-full p-5">
                <img src="./assets/opt-4.png" alt="">
                <p>Get<br>Bonus</p>
            </button>
            <button class="btn flex-col h-full p-5">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button class="btn flex-col h-full p-5">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="cashout-cont" class="w-11/12 mx-auto mb-10 hidden">
        <h3 class="text-2xl font-bold">Cashout</h3>
        <div class="form pt-4">
            <div class="card bg-base-100 w-full mx-auto rounded-6">
                <div class="card-body">
                    <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input id="agent" type="number" minlength="11" maxlength="11" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Enter 11 digit number" />
                        <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="cashout" type="number" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Enter amount to withdraw" />
                    
                        <br>
                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="pin-input" type="password" minlength="4" maxlength="4" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Enter 4 Digit Pin" />
                    
                    <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full text-[16px] font-bold">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <section id="addMoney-cont" class="w-11/12 mx-auto hidden">
        <h3 class="text-2xl font-bold">Add Money</h3>
        <div class="form pt-4">
            <div class="card bg-base-100 w-full mx-auto rounded-6">
                <div class="card-body">
                    <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select A Bank</label>
                    <select id="bank-opt" class="select rounded-full bg-base-200 border-0 w-full">
                        <option disabled selected>Select bank</option>
                        <option value="BRAC BANK">BRAC BANK</option>
                        <option value="IBBL">IBBL</option>
                        <option value="DBBL">DBBL</option>
                    </select>
                    <br>
                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="b_account_num" type="number" minlength="11" maxlength="11" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Enter 11 digit account number" />
                        <br>
                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="add_amount" type="number" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Amount to Add" />
                    
                        <br>
                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="addMoney_pin" type="password" minlength="4" maxlength="4" class="input rounded-full bg-base-200 border-0 w-full" placeholder="Enter 4 Digit Pin" />
                    
                    <button id="addMoney-btn" class="btn btn-primary mt-4 rounded-full text-[16px] font-bold">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="./script/custom_function.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/addMoney.js"></script>
</body>
</html>
